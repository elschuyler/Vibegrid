<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=
device-width, initial-scale=1.0, 
maximum-scale=1.0, user-scalable=no">
 <title>VibeGrid</title>
 <link rel="stylesheet" href="style.css">
</head>
<body>
 <div id="sys-log" style="position:fixed; 
  top:5px; right:5px; font-size:8px; 
  color:yellow; z-index:9999; 
  pointer-events:none;">SYS: WAITING...</div>

 <div id="sidebar-overlay" class="hidden"></div>

 <aside id="sys-sidebar" class="closed">
  <div class="sidebar-header">SYS_MENU</div>
  <button id="btn-clear" 
   class="side-btn">CLEAR MEMORY</button>
  <div style="height: 15px;"></div>
  <button id="btn-settings" 
   class="side-btn">SETTINGS</button>
 </aside>

 <div id="settings-modal" class="hidden">
  <div class="modal-box">
   <div class="sidebar-header">SYS_SETTINGS</div>
   <textarea id="prompt-box" readonly>
[VIBE GRID ROM MAKER PROMPT]
1. Output multiple files (html, css, js).
2. Use 'index.html' as entry.
3. No external assets.
4. User will zip manually.
   </textarea>
   <button id="btn-copy" 
    class="side-btn">COPY PROMPT</button>
   <button id="btn-close-settings" 
    class="side-btn" style="color:#555;">
    CLOSE</button>
  </div>
 </div>

 <div id="app">
  <header id="status-bar">
   <span id="btn-hamburger">☰</span>
   <span id="title-node">VIBEGRID_v1</span>
   <div class="battery-icon">SYS: OK</div>
  </header>

  <section id="library-view"></section>

  <main id="game-container" class="hidden">
   <iframe id="game-screen"></iframe>
  </main>

  <button id="fab-add">+</button>

  <nav id="soft-keys">
   <button class="key active-key" 
    id="btn-vault">VAULT</button>
   <button class="key" 
    id="btn-menu">MENU</button>
  </nav>
 </div>
 
 <script src="main.js"></script>
</body>
 </html>
