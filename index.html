<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" 
  content="width=device-width, 
  initial-scale=1.0, maximum-scale=1.0, 
  user-scalable=no">
  <meta name="theme-color" content="#050505">
  <title>VibeGrid</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="status-bar">
    <span id="fps-counter">FPS: --</span>
    <span id="ram-meter">RAM: --/100MB</span>
  </div>

  <div id="action-bar">
    <button class="btn-grid" 
    onclick="toggleLibrary()">LIBRARY</button>
    <button class="btn-grid" 
    onclick="toggleMenu()">MENU</button>
  </div>

  <main id="app-container">
    <div id="grid-display">
      <iframe id="vibe-screen" 
      sandbox="allow-scripts" 
      frameborder="0"></iframe>
      <div id="overlay-ui"></div>
    </div>
  </main>

  <div id="touch-controls">
    <div id="dpad">
      <div class="d-btn" id="btn-up" 
      data-key="ArrowUp">U</div>
      <div class="d-row">
        <div class="d-btn" id="btn-left" 
        data-key="ArrowLeft">L</div>
        <div class="d-center"></div>
        <div class="d-btn" id="btn-right" 
        data-key="ArrowRight">R</div>
      </div>
      <div class="d-btn" id="btn-down" 
      data-key="ArrowDown">D</div>
    </div>
    
    <div id="action-pad">
      <div class="a-btn" id="btn-b" 
      data-key="x">B</div>
      <div class="a-btn" id="btn-a" 
      data-key="z">A</div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
  </html>
