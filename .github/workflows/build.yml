name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: |
          npm run build
          mkdir -p dist
          find . -maxdepth 2 -iname "index.html" -exec cp {} dist/index.html \;
          echo "Build Check: Contents of dist/"
          ls -R dist/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Add Android Platform
        run: npx @capacitor/cli add android

      - name: Capacitor Sync
        run: npx @capacitor/cli sync

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vibegrid-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
